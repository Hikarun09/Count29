<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カウント29 (Online Edition)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #2c3e50; color: #ecf0f1; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-bottom: 5px; color: #f1c40f; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #setup-container, #game-container { width: 100%; max-width: 800px; background: #34495e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; }
        #game-container { display: none; }
        .input-group { margin: 15px 0; }
        input, button { padding: 10px; font-size: 1em; border-radius: 5px; border: none; }
        input { width: 200px; margin-right: 10px; }
        button { background: #3498db; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        .status-panel { display: flex; flex-wrap: wrap; gap: 15px; background: #1a252f; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .player-status { padding: 5px 10px; border-radius: 5px; background: #2c3e50; min-width: 120px; }
        .player-status.active { background: #27ae60; border: 2px solid #2ecc71; }
        .player-status.dead { color: #7f8c8d; text-decoration: line-through; background: #1a252f; }
        #board { text-align: center; padding: 25px; background: #16a085; border-radius: 8px; margin-bottom: 20px; }
        #total-display { font-size: 4em; font-weight: bold; color: #fff; }
        #last-change { font-size: 1.2em; color: #f1c40f; height: 24px; margin-top: 5px; }
        #log-panel { background: #1a252f; padding: 10px; height: 120px; overflow-y: auto; border-radius: 5px; font-family: monospace; font-size: 0.95em; margin-bottom: 20px; }
        .log-entry { margin-bottom: 4px; border-left: 3px solid #3498db; padding-left: 5px; }
        .log-attack { border-left-color: #e74c3c; color: #ff7675; }
        .log-success { border-left-color: #2ecc71; color: #55efc4; }
        #player-hand-container { background: #2c3e50; padding: 15px; border-radius: 8px; text-align: center; }
        .cards-row { display: flex; justify-content: center; gap: 15px; margin-top: 10px; min-height: 120px; }
        .card { width: 80px; height: 120px; background: white; color: black; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; box-sizing: border-box; font-weight: bold; font-size: 1.2em; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: transform 0.2s; user-select: none; }
        .card:hover { transform: translateY(-10px); }
        .card.red { color: #d63031; }
        .card.suit-symbol { font-size: 1.5em; align-self: center; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #34495e; padding: 30px; border-radius: 10px; text-align: center; }
        .info-text { color: #bdc3c7; font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>カウント29 (オンライン版)</h1>

    <div id="setup-container">
        <h3>👥 ルーム接続設定</h3>
        <div class="input-group">
            <label>あなたの名前: </label>
            <input type="text" id="username-input" value="プレイヤー">
        </div>
        <div class="input-group">
            <label>共通のルームID (何でもOK): </label>
            <input type="text" id="room-input" value="count29-room-xyz">
            <button id="btn-connect" onclick="connectToRoom()">ルームに入る</button>
        </div>
        <div id="lobby-status">ルームに接続していません。</div>
        <div id="member-list" style="margin-top: 10px; color: #f1c40f;"></div>
        <button id="btn-start" style="display:none; margin-top:15px; background:#2ecc71;" onclick="hostStartGame()">ゲームを開始する</button>
    </div>

    <div id="game-container">
        <div class="status-panel" id="players-status-box"></div>
        <div id="board">
            <div style="font-size: 0.9em; color: #bdc3c7;">現在の合計値</div>
            <div id="total-display">0</div>
            <div id="last-change">対戦相手を待っています...</div>
        </div>
        <div id="log-panel"></div>
        <div id="player-hand-container">
            <div id="turn-indicator" style="font-weight:bold; color:#f1c40f; margin-bottom:5px;"></div>
            <div id="player-hand" class="cards-row"></div>
            <div class="info-text">山札の残り: <span id="deck-count">0</span> 枚</div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3>「10」の効果を選択してください</h3>
            <button onclick="select10Effect(10)" style="background:#2ecc71; padding:10px 20px; margin:10px;">＋10</button>
            <button onclick="select10Effect(-10)" style="background:#e74c3c; padding:10px 20px; margin:10px;">－10</button>
        </div>
    </div>

        // --- 通信用変数 ---
        let peer = null;
        let connections = [];
        let myId = "";
        let myName = "";
        let roomID = "";
        let isHost = false;
        let memberNames = {};

            players: [],      // {peerId, name, hp, handCount} の同期用リスト
            myHand: [],       // 自分だけが見える手札
